<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Calculator</h1>
    <div class="calculator">
       <div id="firstRow">
          <div id="displayInput">0</div>
               <div id="firstRowButtons">
                    <button id="clearButton">C</button>
                    <button class="bckspcButton">&larr;</button>
               </div>
       </div>
       <div id="secondRow">
            <button class="number">7</button>
            <button class="number">8</button>
            <button class="number">9</button>
            <button class="operator">+</button>
       </div>
       <div id="thirdRow">
            <button class="number">4</button>
            <button class="number">5</button>
            <button class="number">6</button>
            <button class="operator">-</button>
       </div>
       <div id="fourthRow">
            <button class="number">1</button>
            <button class="number">2</button>
            <button class="number">3</button>
            <button class="operator" id="multiplyOperator">x</button>
       </div>
       <div id="fifthRow">
            <button class="operatorDot">.</button>
            <button class="number">0</button>
            <button class="operatorEquals">=</button>
            <button class="operator">/</button>
       </div>
    </div>





    <script src="script.js"></script>
</body>
</html>
